<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Photo - Barcode & QR Decoder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    #dropZone {
      border: 3px dashed #007bff;
      padding: 40px;
      margin: 20px auto;
      max-width: 600px;
      border-radius: 10px;
      cursor: pointer;
    }
    #result {
      margin: 20px;
      font-size: 1.4em;
      word-break: break-all;
    }
    img {
      max-width: 100%;
      margin: 15px 0;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>📸 Upload Photo to Decode Barcode / QR</h1>
  
  <div id="dropZone">
    <p>Drop your photo here or click to upload</p>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
  </div>

  <div id="preview"></div>
  <div id="result"></div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const resultDiv = document.getElementById('result');

    let detector = null;

    async function initDetector() {
      if ('BarcodeDetector' in window) {
        try {
          detector = new BarcodeDetector({
            formats: ["code_128", "code_39", "ean_8", "ean_13", "qr_code", "pdf417", "itf"]
          });
          return true;
        } catch (e) {}
      }
      resultDiv.innerHTML = "⚠️ Barcode Detection API not supported in this browser.<br>Use Chrome or Edge for best results.";
      return false;
    }

    async function decodeImage(imgElement) {
      if (!detector) {
        const success = await initDetector();
        if (!success) return;
      }

      try {
        const barcodes = await detector.detect(imgElement);
        
        if (barcodes.length > 0) {
          let output = `<strong>✅ Found ${barcodes.length} code(s):</strong><br><br>`;
          
          barcodes.forEach((barcode, index) => {
            output += `<strong>#${index+1} - ${barcode.format}</strong><br>`;
            output += `<span style="color:green;font-size:1.3em;">${barcode.rawValue}</span><br><br>`;
          });

          resultDiv.innerHTML = output;
        } else {
          resultDiv.innerHTML = "❌ No barcode or QR code found in the image.";
        }
      } catch (err) {
        resultDiv.innerHTML = "❌ Error while decoding: " + err.message;
        console.error(err);
      }
    }

    function handleFile(file) {
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.createElement('img');
        img.src = e.target.result;
        
        img.onload = () => {
          preview.innerHTML = `<h3>Preview:</h3>`;
          preview.appendChild(img);
          decodeImage(img);
        };
      };
      reader.readAsDataURL(file);
    }

    // Click to upload
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // Drag and drop support
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.backgroundColor = "#f0f8ff";
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.backgroundColor = "";
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.backgroundColor = "";
      handleFile(e.dataTransfer.files[0]);
    });
  </script>
</body>
</html>
